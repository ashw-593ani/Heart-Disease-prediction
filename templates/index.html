<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }
        .container {
            background: white;
            width: 400px;
            margin: 40px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        input, select {
            width: 90%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        h2 {
            color: #333;
        }
        .result {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Heart Disease Prediction</h2>

    <form action="/predict" method="post">

        <input type="number" name="age" placeholder="Age" required>

        <label>Sex:</label>
        <select name="sex" required>
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <input type="number" name="cp" placeholder="Chest Pain Type" required>
        <input type="number" name="trestbps" placeholder="Resting Blood Pressure" required>
        <input type="number" name="chol" placeholder="Cholesterol" required>
        <input type="number" name="fbs" placeholder="Fasting Blood Sugar (0/1)" required>
        <input type="number" name="restecg" placeholder="Rest ECG (0/1/2)" required>
        <input type="number" name="thalach" placeholder="Max Heart Rate" required>
        <input type="number" name="exang" placeholder="Exercise Induced Angina (0/1)" required>
        <input type="number" step="any" name="oldpeak" placeholder="Oldpeak" required>
        <input type="number" name="slope" placeholder="Slope (0/1/2)" required>
        <input type="number" name="ca" placeholder="CA (0-4)" required>
        <input type="number" name="thal" placeholder="Thal (1/2/3)" required>

        <br>
        <button type="submit">Predict</button>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>
</div>

</body>
</html>
